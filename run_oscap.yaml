---
- name: Run oscap report
  hosts: all
  become: true
  vars:
    oscap_profile: xccdf_org.ssgproject.content_profile_cis_server_l1

  tasks:
    - name: Install OpenSCAP and SCAP content
      ansible.builtin.package:
        name:
          - openscap-scanner
          - scap-security-guide
        state: present

    - name: Set SCAP content path based on OS
      ansible.builtin.set_fact:
        oscap_content: "/usr/share/xml/scap/ssg/content/ssg-{{ 'rhel' if ansible_facts['distribution'] in ['RedHat', 'CentOS', 'Rocky', 'AlmaLinux'] else ansible_facts['distribution'] | lower }}{{ ansible_facts['distribution_major_version'] }}-ds.xml"

    - name: Verify SCAP content file exists
      ansible.builtin.stat:
        path: "{{ oscap_content }}"
      register: scap_content_stat

    - name: Fail if SCAP content is missing
      ansible.builtin.fail:
        msg: "SCAP content file not found at {{ oscap_content }}. Check scap-security-guide installation."
      when: not scap_content_stat.stat.exists

    - name: Run OpenSCAP evaluation
      ansible.builtin.command:
        cmd: >
          oscap xccdf eval
          --profile {{ oscap_profile }}
          --results /tmp/OpenScap_results_file.xml
          {{ oscap_content }}
      ignore_errors: yes

    - name: Generate HTML report
      ansible.builtin.command:
        cmd: oscap xccdf generate report --output /tmp/OpenScap_results_file.html /tmp/OpenScap_results_file.xml

    - name: Download report to control node
      ansible.builtin.fetch:
        src: /tmp/OpenScap_results_file.html
        dest: "../oscap-reports/{{ inventory_hostname }}.html"
        flat: yes
